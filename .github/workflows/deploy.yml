name: 🌹 Deploy Aishwarya's Love Page

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    name: Build & Deploy to Minikube
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🔧 Check Tools
        run: |
          echo "=== Docker ===" && docker --version
          echo "=== Minikube ===" && minikube version
          echo "=== kubectl ===" && kubectl version --client

      - name: 🐳 Start Docker
        run: sudo service docker start || true

      - name: 🚀 Start Minikube
        run: |
          minikube status && echo "Already running" || \
          minikube start --driver=docker --memory=2200mb --cpus=2
          minikube status

      - name: 🔧 Point Docker to Minikube
        run: |
          eval $(minikube docker-env)
          docker info | grep Name

      - name: 🔨 Build Docker Image
        run: |
          eval $(minikube docker-env)
          docker build -t aishwarya-webpage:latest .
          docker images | grep aishwarya

      - name: ☸️ Deploy to Kubernetes
        run: |
          eval $(minikube docker-env)
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: ⏳ Wait for Pods
        run: |
          kubectl rollout status deployment/aishwarya-webpage --timeout=120s

      - name: 🌹 Print Live URL
        run: |
          echo "========================================"
          echo "🌹 Aishwarya's Love Page is LIVE at:"
          minikube service aishwarya-webpage-service --url
          echo "========================================"
