apiVersion: apps/v1
kind: Deployment
metadata:
  name: aishwarya-webpage
  labels:
    app: aishwarya-webpage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aishwarya-webpage
  template:
    metadata:
      labels:
        app: aishwarya-webpage
    spec:
      containers:
        - name: webpage
          image: aishwarya-webpage:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu:    "100m"
            limits:
              memory: "128Mi"
              cpu:    "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
