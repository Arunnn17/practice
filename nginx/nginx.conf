server {
    listen 80;
    server_name localhost;

    # Root directory where our built HTML files live
    root /usr/share/nginx/html;
    index index.html;

    # Serve the page - if file not found, show index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (images, css, js) for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip compression - makes page load faster
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 256;

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
